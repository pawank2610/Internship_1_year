<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes App</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f4f4;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:20px;
}

.add-btn{
width:100%;
padding:15px;
background:#3498db;
color:white;
border:none;
font-size:18px;
cursor:pointer;
margin-bottom:20px;
}

.notes-container{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.note{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

textarea{
width:100%;
height:150px;
padding:10px;
resize:none;
border:1px solid #ddd;
}

.delete-btn{
width:100%;
padding:10px;
margin-top:10px;
background:red;
color:white;
border:none;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h1>Notes App</h1>

<button
class="add-btn"
onclick="addNote()">
+ Add Note
</button>

<div
id="notesContainer"
class="notes-container">
</div>

</div>

<script>

let notes =
JSON.parse(
localStorage.getItem("notes")
) || [];

function saveNotes(){

localStorage.setItem(
"notes",
JSON.stringify(notes)
);

}

function renderNotes(){

const container =
document.getElementById(
"notesContainer"
);

container.innerHTML="";

notes.forEach((note,index)=>{

const noteDiv =
document.createElement("div");

noteDiv.classList.add("note");

noteDiv.innerHTML = `

<textarea
oninput="updateNote(
${index},
this.value
)">
${note}
</textarea>

<button
class="delete-btn"
onclick="deleteNote(${index})">
Delete
</button>

`;

container.appendChild(
noteDiv
);

});

}

function addNote(){

notes.push("");

saveNotes();

renderNotes();

}

function updateNote(
index,
value
){

notes[index] = value;

saveNotes();

}

function deleteNote(index){

notes.splice(index,1);

saveNotes();

renderNotes();

}

renderNotes();

</script>

</body>
</html>
