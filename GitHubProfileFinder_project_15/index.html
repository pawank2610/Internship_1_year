<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Profile Finder</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f4f4;
padding:20px;
}

.container{
max-width:800px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:20px;
}

.search-box{
display:flex;
gap:10px;
margin-bottom:20px;
}

input{
flex:1;
padding:12px;
font-size:16px;
}

button{
padding:12px 20px;
border:none;
background:#24292e;
color:white;
cursor:pointer;
}

button:hover{
opacity:0.8;
}

.profile{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
display:none;
}

.profile img{
width:150px;
height:150px;
border-radius:50%;
display:block;
margin:auto;
}

.profile h2{
text-align:center;
margin:10px 0;
}

.profile p{
text-align:center;
margin:5px 0;
}

.stats{
display:flex;
justify-content:space-around;
margin-top:20px;
}

.stats div{
text-align:center;
}

a{
display:block;
text-align:center;
margin-top:20px;
text-decoration:none;
color:#3498db;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>GitHub Profile Finder</h1>

<div class="search-box">

<input
type="text"
id="username"
placeholder="Enter GitHub Username">

<button onclick="getProfile()">
Search
</button>

</div>

<div id="profile" class="profile">

<img id="avatar">

<h2 id="name"></h2>

<p id="bio"></p>

<div class="stats">

<div>
<h3 id="repos"></h3>
<p>Repositories</p>
</div>

<div>
<h3 id="followers"></h3>
<p>Followers</p>
</div>

<div>
<h3 id="following"></h3>
<p>Following</p>
</div>

</div>

<a
id="profileLink"
target="_blank">
View Profile
</a>

</div>

</div>

<script>

async function getProfile(){

const username =
document.getElementById(
"username"
).value;

if(username===""){

alert("Enter Username");

return;

}

try{

const response =
await fetch(
`https://api.github.com/users/${username}`
);

const data =
await response.json();

if(data.message){

alert("User Not Found");

return;

}

document.getElementById(
"profile"
).style.display =
"block";

document.getElementById(
"avatar"
).src =
data.avatar_url;

document.getElementById(
"name"
).innerText =
data.name || data.login;

document.getElementById(
"bio"
).innerText =
data.bio || "No Bio Available";

document.getElementById(
"repos"
).innerText =
data.public_repos;

document.getElementById(
"followers"
).innerText =
data.followers;

document.getElementById(
"following"
).innerText =
data.following;

document.getElementById(
"profileLink"
).href =
data.html_url;

document.getElementById(
"profileLink"
).innerText =
"Visit GitHub Profile";

}

catch(error){

console.log(error);

alert("Error Fetching Profile");

}

}

</script>

</body>
</html>
