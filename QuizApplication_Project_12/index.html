<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz App</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f4f4;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.quiz-container{
width:600px;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,0.2);
}

h2{
margin-bottom:20px;
}

.option{
display:block;
width:100%;
padding:12px;
margin:10px 0;
border:none;
background:#eee;
cursor:pointer;
text-align:left;
}

.option:hover{
background:#ddd;
}

#nextBtn{
margin-top:20px;
padding:12px;
width:100%;
background:#3498db;
color:white;
border:none;
cursor:pointer;
}

#result{
text-align:center;
display:none;
}

#restartBtn{
margin-top:20px;
padding:12px;
width:100%;
background:#27ae60;
color:white;
border:none;
cursor:pointer;
}

</style>
</head>

<body>

<div class="quiz-container">

<div id="quiz">

<h2 id="question"></h2>

<div id="options"></div>

<button id="nextBtn">
Next Question
</button>

</div>

<div id="result">

<h2>Quiz Completed 🎉</h2>

<h3 id="score"></h3>

<button id="restartBtn">
Restart Quiz
</button>

</div>

</div>

<script>

const quizData = [

{
question:
"What does HTML stand for?",

options:[
"Hyper Text Markup Language",
"High Text Machine Language",
"Hyper Transfer Markup Language",
"Home Tool Markup Language"
],

answer:
"Hyper Text Markup Language"
},

{
question:
"Which language is used for styling web pages?",

options:[
"HTML",
"CSS",
"Python",
"Java"
],

answer:
"CSS"
},

{
question:
"Which JavaScript method selects an element?",

options:[
"getElementById",
"findElement",
"queryData",
"selectNode"
],

answer:
"getElementById"
},

{
question:
"Which company developed JavaScript?",

options:[
"Microsoft",
"Netscape",
"Google",
"Apple"
],

answer:
"Netscape"
},

{
question:
"Which symbol is used for comments in JavaScript?",

options:[
"//",
"##",
"<!-- -->",
"**"
],

answer:
"//"
}

];

let currentQuestion = 0;

let score = 0;

let selectedAnswer = "";

const question =
document.getElementById(
"question"
);

const options =
document.getElementById(
"options"
);

function loadQuestion(){

question.innerText =
quizData[currentQuestion]
.question;

options.innerHTML = "";

quizData[currentQuestion]
.options
.forEach(option=>{

const button =
document.createElement(
"button"
);

button.classList.add(
"option"
);

button.innerText =
option;

button.onclick = ()=>{

selectedAnswer =
option;

};

options.appendChild(
button
);

});

}

loadQuestion();

document
.getElementById(
"nextBtn"
)
.addEventListener(
"click",
()=>{

if(
selectedAnswer ===
quizData[currentQuestion]
.answer
){

score++;

}

selectedAnswer = "";

currentQuestion++;

if(
currentQuestion <
quizData.length
){

loadQuestion();

}

else{

showResult();

}

}
);

function showResult(){

document.getElementById(
"quiz"
).style.display =
"none";

document.getElementById(
"result"
).style.display =
"block";

document.getElementById(
"score"
).innerText =
`Your Score: ${score}/${quizData.length}`;

}

document
.getElementById(
"restartBtn"
)
.addEventListener(
"click",
()=>{

currentQuestion = 0;

score = 0;

selectedAnswer = "";

document.getElementById(
"quiz"
).style.display =
"block";

document.getElementById(
"result"
).style.display =
"none";

loadQuestion();

});

</script>

</body>
</html>
