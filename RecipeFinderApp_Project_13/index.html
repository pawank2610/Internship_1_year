<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe Finder App</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#667eea,#764ba2);
min-height:100vh;
padding:20px;
}

.container{
max-width:1000px;
margin:auto;
}

h1{
text-align:center;
color:white;
margin-bottom:20px;
}

.search-box{
display:flex;
gap:10px;
margin-bottom:20px;
}

input{
flex:1;
padding:12px;
border:none;
border-radius:5px;
font-size:16px;
}

button{
padding:12px 20px;
border:none;
background:#ff6b6b;
color:white;
border-radius:5px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#ee5253;
}

.recipe-card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 0 15px rgba(0,0,0,0.2);
}

.recipe-card img{
width:100%;
height:400px;
object-fit:cover;
}

.content{
padding:20px;
}

.content h2{
margin-bottom:10px;
}

.content p{
margin-bottom:10px;
line-height:1.6;
}

.content ul{
margin-left:20px;
margin-bottom:15px;
}

.loading{
text-align:center;
color:white;
font-size:20px;
margin-top:20px;
}
</style>
</head>
<body>

<div class="container">

<h1>🍔 Recipe Finder App</h1>

<div class="search-box">
<input type="text" id="recipeInput" placeholder="Enter recipe name">
<button onclick="searchRecipe()">Search</button>
</div>

<div id="result"></div>

</div>

<script>

async function searchRecipe(){

const recipe =
document.getElementById("recipeInput").value.trim();

if(recipe===""){
alert("Please enter recipe name");
return;
}

document.getElementById("result").innerHTML =
'<div class="loading">Loading...</div>';

try{

const response =
await fetch(
`https://www.themealdb.com/api/json/v1/1/search.php?s=${recipe}`
);

const data =
await response.json();

if(!data.meals){

document.getElementById("result").innerHTML =
"<h2 style='color:white;text-align:center;'>No Recipe Found 😔</h2>";

return;
}

const meal = data.meals[0];

let ingredients = "";

for(let i=1;i<=20;i++){

let ingredient =
meal[`strIngredient${i}`];

let measure =
meal[`strMeasure${i}`];

if(
ingredient &&
ingredient.trim() !== ""
){

ingredients +=
`<li>${measure} ${ingredient}</li>`;
}
}

document.getElementById("result").innerHTML =

`
<div class="recipe-card">

<img src="${meal.strMealThumb}">

<div class="content">

<h2>${meal.strMeal}</h2>

<p>
<strong>Category:</strong>
${meal.strCategory}
</p>

<p>
<strong>Cuisine:</strong>
${meal.strArea}
</p>

<h3>Ingredients</h3>

<ul>
${ingredients}
</ul>

<h3>Instructions</h3>

<p>
${meal.strInstructions}
</p>

</div>

</div>
`;

}
catch(error){

console.error(error);

document.getElementById("result").innerHTML =
"<h2 style='color:white;text-align:center;'>Error Loading Recipe</h2>";

}

}

</script>

</body>
</html>
