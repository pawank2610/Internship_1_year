<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Slider</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f4f4f4;
}

.slider-container{

    width:800px;

    position:relative;

    overflow:hidden;

    border-radius:15px;

    box-shadow:0 0 15px rgba(0,0,0,0.2);
}

.slide{

    display:none;

    width:100%;
}

.slide img{

    width:100%;

    height:450px;

    object-fit:cover;
}

.active{
    display:block;
}

.prev,
.next{

    position:absolute;

    top:50%;

    transform:translateY(-50%);

    background:rgba(0,0,0,0.5);

    color:white;

    border:none;

    padding:15px;

    cursor:pointer;

    font-size:22px;
}

.prev{
    left:10px;
}

.next{
    right:10px;
}

.dots{

    text-align:center;

    margin-top:10px;

    position:absolute;

    bottom:15px;

    width:100%;
}

.dot{

    height:15px;

    width:15px;

    margin:0 5px;

    background:#bbb;

    border-radius:50%;

    display:inline-block;

    cursor:pointer;
}

.dot.active-dot{
    background:white;
}

@media(max-width:768px){

    .slider-container{
        width:95%;
    }

    .slide img{
        height:250px;
    }
}

</style>
</head>

<body>

<div class="slider-container">

    <div class="slide active">
        <img src="https://picsum.photos/id/1015/800/450">
    </div>

    <div class="slide">
        <img src="https://picsum.photos/id/1016/800/450">
    </div>

    <div class="slide">
        <img src="https://picsum.photos/id/1025/800/450">
    </div>

    <div class="slide">
        <img src="https://picsum.photos/id/1035/800/450">
    </div>

    <button class="prev" onclick="prevSlide()">
        ❮
    </button>

    <button class="next" onclick="nextSlide()">
        ❯
    </button>

    <div class="dots">

        <span class="dot active-dot"
        onclick="currentSlide(0)"></span>

        <span class="dot"
        onclick="currentSlide(1)"></span>

        <span class="dot"
        onclick="currentSlide(2)"></span>

        <span class="dot"
        onclick="currentSlide(3)"></span>

    </div>

</div>

<script>

const slides =
document.querySelectorAll(".slide");

const dots =
document.querySelectorAll(".dot");

let currentIndex = 0;

function showSlide(index){

    slides.forEach(slide=>{
        slide.classList.remove("active");
    });

    dots.forEach(dot=>{
        dot.classList.remove("active-dot");
    });

    slides[index].classList.add("active");

    dots[index].classList.add("active-dot");
}

function nextSlide(){

    currentIndex++;

    if(currentIndex >= slides.length){
        currentIndex = 0;
    }

    showSlide(currentIndex);
}

function prevSlide(){

    currentIndex--;

    if(currentIndex < 0){
        currentIndex = slides.length - 1;
    }

    showSlide(currentIndex);
}

function currentSlide(index){

    currentIndex = index;

    showSlide(currentIndex);
}

setInterval(nextSlide,3000);

</script>

</body>
</html>
